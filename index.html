<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaprisi Frutería</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fceabb, #f8b500);
}
header {
    text-align: center;
    padding: 20px;
    background: white;
}
header img {
    max-width: 140px;
}
.catalogo-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background: #ff7f50;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}
.container {
    display: flex;
    justify-content: center;
    padding: 20px;
}
.pedido {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 400px;
}
.pedido h2 {
    text-align: center;
}
input, textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
button {
    width: 100%;
    padding: 12px;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #1ebe5d;
}
</style>
</head>
<body>

<header>
    <img src="https://github.com/frutasprimera-bot/index.html/blob/main/ChatGPT%20Image%20Apr%2023,%202026,%2010_27_52%20AM.png?raw=true" alt="Logo">
    <h1>Kaprisi Frutería</h1>
    <a class="catalogo-btn" href="https://github.com/frutasprimera-bot/index.html/blob/8c80e6a7aefe70f520d2a2375cedd806bcb4c423/Catalogo1%20(1).pdf" target="_blank">Ver Catálogo</a>
</header>

<div class="container">
    <div class="pedido">
        <h2>Hacer Pedido</h2>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="telefono" placeholder="Teléfono">
        <input type="text" id="direccion" placeholder="Dirección">
        <textarea id="pedido" placeholder="Escriba su pedido"></textarea>
        <button onclick="enviarPedido()">Enviar por WhatsApp</button>
    </div>
</div>

<script>
function enviarPedido() {
    let nombre = document.getElementById('nombre').value;
    let telefono = document.getElementById('telefono').value;
    let direccion = document.getElementById('direccion').value;
    let pedido = document.getElementById('pedido').value;

    let mensaje = `Hola, quiero hacer un pedido:%0A
Nombre: ${nombre}%0A
Teléfono: ${telefono}%0A
Dirección: ${direccion}%0A
Pedido: ${pedido}`;

    let numero = "50664541075";
    let url = `https://wa.me/${numero}?text=${mensaje}`;

    window.open(url, '_blank');
}
</script>

</body>
</html>
